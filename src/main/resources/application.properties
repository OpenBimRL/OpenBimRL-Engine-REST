springdoc.api-docs.path=/api/docs
springdoc.swagger-ui.path=/api
app.version=@project.version@

spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1

app.cors.allowed-origin-patterns[0]=https://ide.florianbecker.eu
app.cors.allowed-origin-patterns[1]=https://creator-tool.inf.bi.rub.de
app.cors.allowed-origin-patterns[2]=http://localhost:*
app.cors.allowed-origin-patterns[3]=https://localhost:*
app.cors.allowed-origin-patterns[4]=http://127.0.0.1:*
app.cors.allowed-origin-patterns[5]=https://127.0.0.1:*
app.cors.allow-credentials=true

# When set (env: OPENBIMRL_API_ACCESS_TOKEN), requests must send Authorization: Bearer <token>.
app.security.access-token=${OPENBIMRL_API_ACCESS_TOKEN:}
